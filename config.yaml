openai:
  api_key: sk-T1AJGx0wmAnamxw55EJ3I5PGULhM3zAgGJT2xf4GWzcH6EwH
  base_url: https://api.openai-proxy.org/v1
  max_input_tokens: 40000
  model: gpt-5.4
  timeout_seconds: 60
  max_retries: 3
  retry_backoff_seconds: 2
  max_concurrency: 5
project:
  config_file_ext:
  - .yaml
  - .xml
  - .json
  - .conf
  - .ini
  - .toml
  - .config
  - .settings
  exclude_dir:
  - node_modules
  - dist
  - build
  - out
  - venv
  - .venv
  - env
  - target
  - vendor
  - bower_components
  - .git
  - .svn
  - .hg
  - .idea
  - .vscode
  - .metadata
  - nbproject
  - test
  - tests
  - spec
  - specs
  - tmp
  - temp
  - cache
  - logs
  - docker
  - containers
  - k8s
  - kube
  - .circleci
  - .github
  - .travis
  - docs
  - doc
  - .secrets
  - .env
  exclude_max_file_size: 1
  dependency_parse_engine: ast
  source_file_ext:
  - .py
  - .go
  - .js
  - .java
  - .cpp
  - .php
  - .aspx
  - .asp
  - .c
  - .cs
  - .h
  audit_context_depth: 10
  max_audit_nodes: 40

  # Agent_2 失败率保护阈值
  # 当大模型请求失败率高于该比例时，最终结果会被标记为“审计不完整”，避免把网络故障误判为“审计通过”
  # 一般建议 0.2 ~ 0.4
  agent2_failure_rate_threshold: 0.3

  # Agent_2 风险候选预筛选阈值
  # 值越大，送入 Agent_2 的节点越少，速度更快但可能漏掉边缘风险
  # 值越小，覆盖更广但噪音更多
  agent2_candidate_score_threshold: 8

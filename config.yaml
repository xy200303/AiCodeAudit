openai:
  api_key: sk-T1AJGx0wmAnamxw55EJ3I5PGULhM3zAgGJT2xf4GWzcH6EwH
  base_url: https://api.openai-proxy.org/v1
  max_input_tokens: 40000
  model: gpt-5.4
  timeout_seconds: 60
  max_retries: 3
  retry_backoff_seconds: 2
  max_concurrency: 5
project:
  # 特殊值说明：
  # - `agent2_candidate_score_threshold: -1` 表示关闭 Agent_2 预筛选
  # - `agent2_*_dedup_limit: -1` 表示关闭对应阶段的去重限制
  config_file_ext:
  - .yaml
  - .xml
  - .json
  - .conf
  - .ini
  - .toml
  - .config
  - .settings
  exclude_dir:
  - node_modules
  - dist
  - build
  - out
  - venv
  - .venv
  - env
  - target
  - vendor
  - bower_components
  - .git
  - .svn
  - .hg
  - .idea
  - .vscode
  - .metadata
  - nbproject
  - test
  - tests
  - spec
  - specs
  - tmp
  - temp
  - cache
  - logs
  - docker
  - containers
  - k8s
  - kube
  - .circleci
  - .github
  - .travis
  - docs
  - doc
  - .secrets
  - .env
  exclude_max_file_size: 1
  dependency_parse_engine: ast
  source_file_ext:
  - .py
  - .go
  - .js
  - .java
  - .cpp
  - .php
  - .aspx
  - .asp
  - .c
  - .cs
  - .h
  audit_context_depth: 10
  max_audit_nodes: 40

  # Agent_2 失败率保护阈值
  # 当大模型请求失败率高于该比例时，最终结果会被标记为“审计不完整”，避免把网络故障误判为“审计通过”
  # 一般建议 0.2 ~ 0.4
  agent2_failure_rate_threshold: 0.3

  # Agent_2 风险候选预筛选阈值
  # 值越大，送入 Agent_2 的节点越少，速度更快但可能漏掉边缘风险
  # 值越小，覆盖更广但噪音更多
  agent2_candidate_score_threshold: 4

  # 统一依赖上下文中，每个节点向上/向下扩展时最多保留多少条高价值分支
  # 值越大，依赖树覆盖更全，但上下文更长、噪音更多
  # 一般建议 2~5
  dependency_tree_max_branches: 3

  # 统一依赖上下文中最多保留多少条“重点传播链路”
  # 值越大，更容易覆盖边缘传播路径，但也会增加提示词长度
  # 一般建议 3~8
  dependency_context_max_focus_paths: 6

  # 依赖树任务内部相同 payload 最多保留多少份
  # 设为 1 表示正常去重；设为 -1 表示关闭限制
  agent2_tree_payload_dedup_limit: -1

  # 节点回退任务内部相同 payload / 上下文签名最多保留多少份
  # 设为 1 表示正常去重；设为 -1 表示关闭限制
  agent2_node_payload_dedup_limit: -1

  # 最终合并阶段相同 payload 最多保留多少份
  # 设为 1 表示正常去重；设为 -1 表示关闭限制
  agent2_final_payload_dedup_limit: -1

